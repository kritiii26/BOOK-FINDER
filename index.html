<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookQuest | Book Finder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Passions+Conflict&family=Pinyon+Script&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo">CROSSWORD</h1>
            <button id="darkModeToggle" class="btn" onclick="toggleDarkMode()" aria-label="Toggle Dark Mode">
                🌙 Dark Mode
            </button>
        </header>

        <section class="controls-panel">
            <div class="search-row">
                <input type="text" id="searchInput" placeholder="Search for books... (press Enter)" onkeyup="handleSearch(event)">
                <button id="searchBtn" class="search-btn" onclick="searchBooks()">Search</button>
            </div>
            
            <div class="filters-grid">
                <div class="control-row">
                    <label for="filterInput">Filter:</label>
                    <input type="text" id="filterInput" placeholder="Filter by title or author..." oninput="handleFilter()">
                </div>

                <div class="control-row">
                    <label for="categorySelect">Category:</label>
                    <select id="categorySelect" onchange="handleFilter()">
                        <option value="all">All Categories</option>
                    </select>
                </div>

                <div class="control-row">
                    <label for="sortSelect">Sort:</label>
                    <select id="sortSelect" onchange="handleFilter()">
                        <option value="none">No Sorting</option>
                        <option value="asc">Title (A-Z)</option>
                        <option value="desc">Title (Z-A)</option>
                    </select>
                </div>

                <div class="control-row checkbox-row">
                    <input type="checkbox" id="favoritesCheckbox" onchange="handleFilter()">
                    <label for="favoritesCheckbox">Show Favorites Only</label>
                </div>
            </div>
        </section>

        <p id="loading" style="display:none;">⏳ Finding the best books for you...</p>

        <div id="results">
            <!-- Books will be injected here via JS map() -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
